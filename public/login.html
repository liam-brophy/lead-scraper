<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lead Pipeline — Login</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #f5f5f5;
  }
  form {
    background: #fff; padding: 2rem; border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15); width: 100%; max-width: 320px;
  }
  h1 { font-size: 1.1rem; margin: 0 0 1rem; }
  input[type="password"] {
    width: 100%; padding: 0.6rem; font-size: 1rem;
    border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
  }
  button {
    width: 100%; margin-top: 0.75rem; padding: 0.6rem; font-size: 1rem;
    border: none; border-radius: 4px; background: #1a1a1a; color: #fff; cursor: pointer;
  }
  .error { color: #c0392b; font-size: 0.85rem; margin: 0 0 0.75rem; }
</style>
</head>
<body>
  <form method="POST" action="/login">
    <h1>Lead Pipeline</h1>
    <p class="error" id="error" hidden>Wrong password.</p>
    <input type="password" name="password" placeholder="Password" autofocus required />
    <button type="submit">Sign in</button>
  </form>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error').hidden = false;
    }
  </script>
</body>
</html>
